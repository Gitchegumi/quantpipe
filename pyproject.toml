[['tool.poetry]\nname = "QuantPipe"\nversion = "0.6.0"\ndescription = "Algorithmic FX trading strategies with backtesting framework"\nauthors = ["GitcheGumi'], [{}], ['tool.poetry.scripts]\nquantpipe = "src.cli.main:main"\nqp-replay = "src.cli.replay:main', ['tool.poetry.dependencies]\npython =', 3.12, 4.0, '\nnumpy = "^2.0.0"\npandas = "^2.2.0"\npydantic = "^2.4.0"\nrich = "^13.6.0"\njsonschema = "^4.25.1"\npolars = "^1.17.0"\npyarrow = "^18.0.0"\npsutil = "^6.1.0"\nduckdb = "^1.1.0"\n\n# Optional performance dependencies (install manually if needed):\n# numba = "^0.58.0"  # JIT compilation for trade simulation speedup (10-50x gains)\ntqdm = "^4.67.1"\npy-spy = "^0.4.1"\njoblib = "^1.5.2"\n\n# Datashader visualization stack (for large dataset backtest analysis)\nholoviews = "^1.19.0"\nhvplot = "^0.10.0"\ndatashader = "^0.16.0"\npanel = "^1.4.0"\nbokeh = "^3.8.2"\ndask = "^2024.1.0"  # Pin to 2024.x for Datashader compatibility (2025.x has breaking changes)\nquestionary = "^2.1.1', ['tool.poetry.group.dev.dependencies]\npytest = "^8.3.4"\npytest-benchmark = "^4.0.0"\nhypothesis = "^6.88.0"\nruff = "^0.1.0"\nblack = "^24.3.0"\npylint = "^3.0.0"\nmypy = "^1.7.0"\nipykernel = "^7.1.0"\npyyaml = "^6.0.3"\njinja2 = "^3.1.0', 'Template rendering for strategy scaffolding (022-strategy-templating)\n\n[build-system]\nrequires = ["poetry-core'], 'build-backend = "poetry.core.masonry.api', ['tool.black]\nline-length = 88\ntarget-version = [\'py311\']\nskip-string-normalization = false\ninclude = \'.pyi?$\'\nexclude = \'\'\'\n/(\n    .git\n  | .venv\n  | .tox\n  | build\n  | dist\n  | __pycache__\n)/\n\'\'\'\n\n[tool.ruff]\nline-length = 88\ntarget-version = "py311"\nselect = [\n    "E', 'pycodestyle errors\n    "W', 'pycodestyle warnings\n    "F', 'pyflakes\n    "I', 'isort\n    "N', 'pep8-naming\n    "UP', 'pyupgrade\n    "B', 'flake8-bugbear\n    "C4', 'flake8-comprehensions\n    "SIM', 'flake8-simplify\n    "PERF', 'perflint (performance anti-patterns)\n    "PD', 'pandas-vet (pandas best practices)\n]\nignore = [\n    "E501', 'line too long (handled by black)\n]\nexclude = [\n    ".git', '.venv', '__pycache__', 'build', 'dist'], ['tool.ruff.per-file-ignores]\n"tests/**/*.py" = ["S101'], 'Allow assert in tests\n# iterator_mode.py intentionally uses .iterrows() for row-by-row iteration pattern\n"src/io/iterator_mode.py" = ["PD010'], 'Allow .iterrows() in iterator mode\n\n[tool.pylint.main]\nfail-under = 8.0\nignore = [".venv', '__pycache__', 'build', 'dist'], 'jobs = 0  # Auto-detect CPU cores\nrecursive = true\nsuggestion-mode = true\n\n[tool.pylint.format]\nmax-line-length = 88\n\n[tool.pylint.messages_control]\ndisable = [\n    "C0111', 'missing-docstring (we use ruff for this)\n    "C0103', 'invalid-name (too strict for math variables)\n    "R0913', 'too-many-arguments (common in configs)\n    "R0914', 'too-many-locals (common in algos)\n    "W0212', 'protected-access (needed for testing)\n    "C0415', 'import-outside-toplevel (sometimes needed)\n]\n\n[tool.pylint.design]\nmax-args = 10\nmax-attributes = 15\nmax-branches = 15\nmax-locals = 20\nmax-returns = 6\nmax-statements = 60\n\n[tool.mypy]\npython_version = "3.11', 'warn_return_any = true\nwarn_unused_configs = true\ndisallow_untyped_defs = false  # Gradually enable\nignore_missing_imports = true\nstrict_optional = true\ncheck_untyped_defs = true\n\n[tool.pytest.ini_options]\ntestpaths = ["tests', 'python_files = "test_*.py"\npython_classes = "Test*"\npython_functions = "test_*"\nmarkers = [\n    "local_data: marks tests requiring local gitignored data files (skipped in CI)']